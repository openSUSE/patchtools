name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: registry.opensuse.org/opensuse/bci/python:3.11
      options:  -w /test
      volumes:
        - ${{ github.workspace }}:/test

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          python3 -m pytest -v test
